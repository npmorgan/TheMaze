<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Maze</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #eeeae1;
      --surface2: #e4dfd4;
      --border: rgba(0,0,0,0.15);
      --border2: rgba(0,0,0,0.25);
      --text: #1a1814;
      --text2: #5a5650;
      --text3: #999490;
      --danger: #a32d2d;
      --success: #0f6e56;
      --teal: #5DCAA5;
      --purple: #AFA9EC;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1814;
        --surface: #242018;
        --surface2: #2e291f;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
        --text: #f0ece3;
        --text2: #a09a90;
        --text3: #605a52;
        --danger: #f09595;
        --success: #5DCAA5;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .maze-wrap {
      max-width: 620px;
      width: 100%;
    }

    .maze-header {
      font-family: 'VT323', monospace;
      font-size: 52px;
      color: var(--text);
      text-align: center;
      letter-spacing: 4px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .maze-sub {
      text-align: center;
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 2rem;
      font-style: italic;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'VT323', monospace;
      font-size: 15px;
      color: var(--text3);
      margin-bottom: 1rem;
      flex-wrap: wrap;
      min-height: 26px;
    }

    .crumb {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
    }

    .crumb.L { border-bottom: 2px solid var(--teal); color: #1D9E75; }
    .crumb.R { border-bottom: 2px solid var(--purple); color: #7F77DD; }

    .scene-box {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      margin-bottom: 1rem;
      min-height: 150px;
      position: relative;
    }

    .scene-depth {
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: var(--text3);
      position: absolute;
      top: 14px;
      right: 16px;
      letter-spacing: 1px;
    }

    .scene-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 10px;
    }

    .scene-text {
      font-size: 19px;
      line-height: 1.65;
      color: var(--text);
    }

    .scene-text.dead { color: var(--danger); font-style: italic; }
    .scene-text.win  { color: var(--success); }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .dir-btn {
      flex: 1;
      padding: 16px;
      font-family: 'VT323', monospace;
      font-size: 24px;
      letter-spacing: 2px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .dir-btn:hover  { background: var(--surface2); }
    .dir-btn:active { transform: scale(0.97); }
    .dir-btn.left-btn  { border-left: 3px solid var(--teal); }
    .dir-btn.right-btn { border-right: 3px solid var(--purple); }
    .dir-btn:disabled  { opacity: 0.35; cursor: not-allowed; }

    .restart-btn {
      width: 100%;
      padding: 12px;
      font-family: 'VT323', monospace;
      font-size: 20px;
      letter-spacing: 1px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .restart-btn:hover { background: var(--surface); color: var(--text); }

    .hidden { display: none !important; }

    .fade-in {
      animation: fi 0.3s ease;
    }

    @keyframes fi {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="maze-wrap">
    <div class="maze-header">THE MAZE</div>
    <div class="maze-sub">choose wisely. or don't. it's funnier that way.</div>

    <div class="breadcrumb" id="breadcrumb"></div>

    <div class="scene-box" id="scene-box">
      <span class="scene-depth" id="depth-label">DEPTH 0</span>
      <span class="scene-icon" id="scene-icon"></span>
      <div class="scene-text" id="scene-text"></div>
    </div>

    <div class="btn-row" id="choice-row">
      <button class="dir-btn left-btn"  id="btn-left"  onclick="go('left')">← LEFT</button>
      <button class="dir-btn right-btn" id="btn-right" onclick="go('right')">RIGHT →</button>
    </div>

    <button class="restart-btn" onclick="restart()">↺ START OVER</button>
  </div>

  <script>
    const tree = {
      icon: '🏰', text: "You stand at the entrance of the Great Maze of Moderately Questionable Decisions. Two corridors stretch before you, both equally dark, equally damp, and both smelling faintly of someone else's bad choices.",
      left: {
        icon: '🕯️', text: "A flickering torch reveals a stone corridor. Ancient carvings line the walls. Either this is a sacred temple... or someone with too much free time went WILD with a chisel.",
        left: {
          icon: '🐀', text: "A small room full of rats. They stare at you. You stare at them. One rat is wearing a tiny hat. You feel judged.",
          dead: true, deathText: "The rats vote unanimously to evict you. You are escorted out by a rat in a tiny hard hat labeled 'SECURITY.'"
        },
        right: {
          icon: '🧩', text: "A puzzle door! Four ancient symbols glow on the stone. A, B, C, and D. A sign reads: 'Press the correct symbol.' There is no other information whatsoever.",
          left: {
            icon: '💥', text: "You chose A. The floor opens.",
            dead: true, deathText: "You fall into a ball pit. It is very fun, actually, but there is no way out. You live here now."
          },
          right: {
            icon: '🔓', text: "You press C at random. The door opens. You're a genius.",
            left: {
              icon: '🌊', text: "A roaring underground river blocks your path. A troll sleeps on the only bridge, clutching a sign that reads 'TrOll HaVe UnLimiTed PtO.'",
              dead: true, deathText: "You try to wake the troll. He rolls over and mumbles 'send me a calendar invite.' You cannot schedule a meeting with a troll. Journey over."
            },
            right: {
              icon: '🏆', text: "A glowing golden door! Inscribed above: 'WINNER'S EXIT.' You can hear faint applause from the other side.",
              win: true, winText: "You burst through and are immediately handed a certificate that reads 'COMPLETED THE MAZE (probably by accident).' A crowd of ghosts cheers. You are their champion."
            }
          }
        }
      },
      right: {
        icon: '🌫️', text: "A foggy passage. The mist swirls mysteriously. Something moves in the shadows. It's probably fine. It's definitely not fine.",
        left: {
          icon: '🧙', text: "A wizard sits cross-legged, levitating two inches off the ground. 'Ah,' he says, 'a traveler. I can offer you wisdom... or a sandwich.' He holds up one sandwich.",
          left: {
            icon: '📜', text: "You ask for wisdom. He hands you a scroll. It says 'LEFT IS RIGHT AND RIGHT IS LEFT' in very dramatic font.",
            left: {
              icon: '🪞', text: "You go right (which the scroll said was left). You find a mirror. The mirror-you looks way more confident.",
              dead: true, deathText: "Mirror-you winks, steps out of the mirror, and continues the maze without you. Your journey ends here, replaced."
            },
            right: {
              icon: '🎪', text: "A carnival! Rides! Games! A sign says 'NO EXITS.' This is technically a trap but it's a very fun trap.",
              dead: true, deathText: "You spend three weeks on the Ferris wheel. Eventually you become the new carnival barker. This is your life now."
            }
          },
          right: {
            icon: '🥪', text: "You take the sandwich. It is an incredible sandwich. You feel powerful. You feel ready. You feel slightly full.",
            left: {
              icon: '🕷️', text: "A corridor full of webs. A very large spider sits in the center. She has a name tag that says 'KAREN.'",
              dead: true, deathText: "Karen asks to speak to the manager of this maze. There is no manager. This upsets Karen enormously. You are caught in the middle. Literally."
            },
            right: {
              icon: '⚗️', text: "A laboratory! A skeleton in a lab coat stands at a bubbling desk. A chalkboard reads: 'EXPERIMENT: Can adventurers resist pressing the big red button?' There is a big red button.",
              left: {
                icon: '🔴', text: "You press it.",
                dead: true, deathText: "Nothing dramatic happens. The button plays 'Jingle Bells.' You feel profound disappointment. In your distraction, a trapdoor opens. Classic."
              },
              right: {
                icon: '🧪', text: "You ignore the button, which took incredible willpower, and examine the lab. A map on the wall shows the exit! It leads... left.",
                left: {
                  icon: '🌅', text: "You emerge from the maze into sunlight! Birds sing! A mailbox at the exit reads 'CONGRATULATIONS, ADVENTURER.'",
                  win: true, winText: "Inside the mailbox: a coupon for 15% off at a local deli, and a handwritten note saying 'We honestly didn't think anyone would make it this way. Impressive.' You have won."
                },
                right: {
                  icon: '🕳️', text: "You go right anyway, because you don't follow maps.",
                  dead: true, deathText: "There is a hole. It is a very simple hole. You fall in. The map weeps."
                }
              }
            }
          }
        },
        right: {
          icon: '🐉', text: "A dragon. An actual dragon. She is doing a crossword puzzle and does not look up.",
          left: {
            icon: '💬', text: "You attempt conversation. 'Seven letters,' she says, 'means deeply regretting something.' You suggest 'remorse.' She looks up. She looks impressed.",
            left: {
              icon: '🤝', text: "The dragon thanks you and offers to let you pass. Her name is Brenda. Brenda is going through some stuff.",
              left: {
                icon: '🌑', text: "A pitch-black corridor. You can see absolutely nothing. You walk forward confidently.",
                dead: true, deathText: "You walk into a wall. Not even a magic wall. Just a wall. A perfectly normal, unremarkable wall. The end."
              },
              right: {
                icon: '⭐', text: "A staircase leads UP. At the top: a door labeled 'OUT (FOR REAL THIS TIME).'",
                win: true, winText: "You exit the maze into a parking lot. A shuttle bus is waiting. The driver nods knowingly. You have bested the maze. The driver gives you a commemorative foam finger."
              }
            },
            right: {
              icon: '😤', text: "You try to correct Brenda's crossword. 'Actually I think that's wrong—' Brenda's eyes narrow.",
              dead: true, deathText: "Brenda's crossword was correct. You have insulted her intelligence. She is a 400-year-old dragon. She has read every book. You have not."
            }
          },
          right: {
            icon: '🏃', text: "You run. You run fast. You are very proud of how fast you run.",
            dead: true, deathText: "You run directly into a dead end. You are now trapped in a corner, breathing heavily, having accomplished nothing at impressive speed."
          }
        }
      }
    };

    let current = tree;
    let path = [];

    function render() {
      const box = document.getElementById('scene-box');
      box.classList.remove('fade-in');
      void box.offsetWidth;
      box.classList.add('fade-in');

      document.getElementById('scene-icon').textContent = current.icon;
      document.getElementById('depth-label').textContent = 'DEPTH ' + path.length;

      const st = document.getElementById('scene-text');
      const row = document.getElementById('choice-row');

      if (current.dead) {
        st.className = 'scene-text dead';
        st.textContent = '💀 ' + current.deathText;
        row.classList.add('hidden');
      } else if (current.win) {
        st.className = 'scene-text win';
        st.textContent = '✨ ' + current.winText;
        row.classList.add('hidden');
      } else {
        st.className = 'scene-text';
        st.textContent = current.text;
        row.classList.remove('hidden');
        document.getElementById('btn-left').disabled  = !current.left;
        document.getElementById('btn-right').disabled = !current.right;
      }

      const bc = document.getElementById('breadcrumb');
      bc.innerHTML = path.length
        ? path.map(d => `<span class="crumb ${d}">${d === 'L' ? '← L' : 'R →'}</span>`).join(' ')
        : '';
    }

    function go(dir) {
      const next = dir === 'left' ? current.left : current.right;
      if (!next) return;
      path.push(dir === 'left' ? 'L' : 'R');
      current = next;
      render();
    }

    function restart() {
      current = tree;
      path = [];
      render();
    }

    render();
  </script>
</body>
</html>
