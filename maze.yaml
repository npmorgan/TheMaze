                              text: You miss your own session hanging out in Sam's suite.
                              img: media/sam.jpg
                              dead: true

                          - label: Slip back out
                            region: [60, 30, 30, 45]
                            next:
                              text: Back in the hallway. Keep moving.
                              img: media/hallway.jpg

                              hotspots:
                                - label: Ryan's suite
                                  region: [5, 20, 25, 60]
                                  next:
                                    text: Ryan's in here. He's very enthusiastic about espresso.
                                    img: media/ryan.jpg

                                    hotspots:
                                      - label: Talk espresso machines
                                        region: [20, 30, 60, 50]
                                        next:
                                          text: Suddenly it's 6pm. You missed your session but you now know how to make perfect latte foam.
                                          img: media/espresso.jpg
                                          dead: true

                                      - label: Excuse yourself
                                        region: [5, 60, 25, 30]
                                        next:
                                          text: You're back in the hallway. KB's suite is just ahead.
                                          img: media/hallway.jpg

                                          hotspots:
                                            - label: KB's suite
                                              region: [38, 20, 28, 60]
                                              next:
                                                text: You made it to KB's suite! Time to color.
                                                img: media/kb.jpg
                                                win: true

                                - label: KB's suite
                                  region: [62, 20, 32, 60]
                                  next:
                                    text: You made it to KB's suite! Time to color.
                                    img: media/kb.jpg
                                    win: true

                    - label: KB's suite
                      region: [38, 20, 28, 60]
                      next:
                        text: You made it to KB's suite! Time to color.
                        img: media/kb.jpg
                        win: true

        - label: Dante's suite
          region: [74, 28, 22, 50]
          next:
            text: You're in Dante's suite. Lucy the cat sits on the mixing board and ignores you completely.
            img: media/dante.jpg

            hotspots:
              - label: Try to get Lucy's attention
                region: [30, 55, 40, 35]
                next:
                  text: You wait and wait for Lucy to acknowledge you. She never does. You never leave.
                  img: media/dante.jpg
                  dead: true

              - label: Head back out
                region: [5, 30, 18, 50]
                next:
                  text: Back in the hallway. KB's suite is just ahead.
                  img: media/hallway.jpg

                  hotspots:
                    - label: KB's suite
