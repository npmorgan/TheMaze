# ─────────────────────────────────────────────────────────────────────────────
#  MAZE DECISION TREE  ·  maze.yaml
# ─────────────────────────────────────────────────────────────────────────────
#
#  HOW TO WRITE YOUR MAZE
#  ──────────────────────
#  Every scene can have these fields:
#
#    text:      What the player reads at this scene.         (required)
#    img:       Image shown for this scene.                  (optional)
#    dead: true Ends the path as a failure.                  (optional)
#    win: true  Ends the path as a success.                  (optional)
#    hotspots:  List of clickable areas on the image.        (optional)
#
#  Each hotspot has:
#    label:     Text shown when the player hovers.           (required)
#    region:    [x, y, width, height] as % of image size.   (required)
#    next:      An entire new scene indented underneath.     (required)
#
#  TIPS
#  ────
#  • Use editor.html to draw hotspot regions visually on your images.
#  • Region values are percentages: [5, 10, 40, 60] means
#    x=5%, y=10%, width=40%, height=60% of the image.
#  • Images go in the media/ folder → reference as: media/filename.jpg
#  • A dead/win scene needs no hotspots.
#
# ─────────────────────────────────────────────────────────────────────────────

text: Welcome to Ethos Studio. The lobby stretches out in front of you.
img: media/entry.jpg

hotspots:
  - label: Sit on the couch
    region: [4, 52, 38, 40]
    next:
      text: It's way too comfortable. You lose track of time entirely. Your session starts without you.
      img: media/couch.jpg
      dead: true

  - label: Sign in at the desk
    region: [58, 28, 36, 44]
    next:
      text: You sign in with Bones and order a coffee. KB is ready for you — now which way?
      img: media/desk.jpg

      hotspots:
        - label: Take the left hallway
          region: [2, 20, 22, 70]
          next:
            text: You step into the bathroom. Quiet in here.
            img: media/bathroom.jpg

            hotspots:
              - label: Linger a while
                region: [10, 30, 35, 50]
                next:
                  text: Someone outside cranks the Sonos to full volume. The vibrations knock you out cold. You miss everything.
                  img: media/sonos.jpg
                  dead: true

              - label: Head back to the hallway
                region: [55, 35, 35, 50]
                next:
                  text: You're back in the main hallway. Three doors ahead of you.
                  img: media/hallway.jpg

                  hotspots:
                    - label: Sam's suite
                      region: [5, 20, 25, 60]
                      next:
                        text: Sam's mid-session. He gives you a look.
                        img: media/sam.jpg

                        hotspots:
                          - label: Stay and watch
                            region: [10, 25, 35, 50]
