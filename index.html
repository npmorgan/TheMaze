<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Maze</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #eeeae1;
      --surface2: #e4dfd4;
      --border: rgba(0,0,0,0.15);
      --border2: rgba(0,0,0,0.25);
      --text: #1a1814;
      --text2: #5a5650;
      --text3: #999490;
      --danger: #a32d2d;
      --success: #0f6e56;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1814;
        --surface: #242018;
        --surface2: #2e291f;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
        --text: #f0ece3;
        --text2: #a09a90;
        --text3: #605a52;
        --danger: #f09595;
        --success: #5DCAA5;
      }
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .maze-wrap { max-width: 1000px; width: 100%; }

    .maze-header {
      font-family: 'VT323', monospace;
      font-size: 52px;
      color: var(--text);
      text-align: center;
      letter-spacing: 4px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .maze-sub {
      text-align: center;
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 2rem;
      font-style: italic;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: var(--text3);
      margin-bottom: 1rem;
      flex-wrap: wrap;
      min-height: 26px;
    }

    .crumb {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
    }

    .crumb-sep { color: var(--text3); font-size: 12px; }

    /* Scene card */
    .scene-box {
      background: var(--surface);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 1rem;
      position: relative;
    }

    .scene-depth {
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: var(--text3);
      position: absolute;
      top: 14px;
      right: 16px;
      letter-spacing: 1px;
      z-index: 4;
      background: var(--surface);
      padding: 0 4px;
      border-radius: 3px;
    }

    /* Image + hotspot layer */
    .scene-img-wrap {
      width: 100%;
      height: 62vh;
      overflow: hidden;
      position: relative;
      background: #1a1814;
    }

    .scene-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: #5a5650;
      font-family: 'VT323', monospace; font-size: 15px; letter-spacing: 1px;
    }

    .img-placeholder svg { opacity: 0.3; }

    /* Hotspot SVG — sits over the image, % coords via viewBox */
    #hotspot-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    /* Floating label tooltip */
    #hs-tooltip {
      position: absolute;
      z-index: 5;
      font-family: 'VT323', monospace;
      font-size: 17px;
      letter-spacing: 1px;
      background: rgba(10, 8, 6, 0.88);
      color: #f0ece3;
      padding: 4px 14px 5px;
      border-radius: 4px;
      pointer-events: none;
      white-space: nowrap;
      transform: translate(-50%, calc(-100% - 10px));
      display: none;
      border: 0.5px solid rgba(255,255,255,0.12);
    }

    /* "hover to explore" hint fades after first interaction */
    #hs-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'VT323', monospace;
      font-size: 14px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.28);
      z-index: 3;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    /* Scene text */
    .scene-body { padding: 1.25rem 1.75rem 1.75rem; }
    .scene-text { font-size: 19px; line-height: 1.65; color: var(--text); }
    .scene-text.dead { color: var(--danger); font-style: italic; }
    .scene-text.win  { color: var(--success); }

    .restart-btn {
      width: 100%; padding: 12px;
      font-family: 'VT323', monospace; font-size: 20px; letter-spacing: 1px;
      border: 0.5px solid var(--border); border-radius: var(--radius-md);
      background: transparent; color: var(--text2);
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .restart-btn:hover { background: var(--surface); color: var(--text); }

    .fade-in { animation: fi 0.3s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="maze-wrap">
    <div class="maze-header">Get to the Session!</div>
    <div class="maze-sub">Click on what you see.</div>

    <div class="breadcrumb" id="breadcrumb"></div>

    <div class="scene-box fade-in" id="scene-box">
      <span class="scene-depth" id="depth-label">DEPTH 0</span>

      <div class="scene-img-wrap" id="scene-img-wrap">
        <!-- Image -->
        <div class="img-placeholder" id="scene-placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          SCENE IMAGE
        </div>
        <img id="scene-img" src="" alt="scene" style="display:none;" />

        <!-- Hotspot overlay — viewBox 0 0 100 100 maps to % of image -->
        <svg id="hotspot-svg"
          viewBox="0 0 100 100"
          preserveAspectRatio="none"
          style="pointer-events:none;"></svg>

        <!-- Tooltip -->
        <div id="hs-tooltip"></div>

        <!-- Subtle hover hint -->
        <div id="hs-hint">hover to explore</div>
      </div>

      <div class="scene-body">
        <div class="scene-text" id="scene-text"></div>
      </div>
    </div>

    <button class="restart-btn" onclick="restart()">↺ START OVER</button>
  </div>

  <!-- Tree data — regenerate maze.js from editor.html when you update maze.yaml -->
  <script src="maze.js"></script>

  <script>
    let current = tree;
    let path    = [];
    let hinted  = false;

    function render() {
      // Fade animation
      const box = document.getElementById('scene-box');
      box.classList.remove('fade-in');
      void box.offsetWidth;
      box.classList.add('fade-in');

      document.getElementById('depth-label').textContent = 'DEPTH ' + path.length;

      // Image
      const img         = document.getElementById('scene-img');
      const placeholder = document.getElementById('scene-placeholder');
      if (current.img) {
        img.src            = current.img;
        img.style.display  = 'block';
        placeholder.style.display = 'none';
      } else {
        img.style.display  = 'none';
        placeholder.style.display = 'flex';
      }

      // Text
      const st = document.getElementById('scene-text');
      if (current.dead) {
        st.className  = 'scene-text dead';
        st.textContent = '💀 ' + (current.deathText || current.text);
      } else if (current.win) {
        st.className  = 'scene-text win';
        st.textContent = '✨ ' + (current.winText || current.text);
      } else {
        st.className  = 'scene-text';
        st.textContent = current.text;
      }

      // Hotspots
      buildHotspots();

      // Breadcrumb
      const bc = document.getElementById('breadcrumb');
      bc.innerHTML = path.length
        ? path.map(p => `<span class="crumb">${p}</span>`).join('<span class="crumb-sep"> › </span>')
        : '';
    }

    function buildHotspots() {
      const svg     = document.getElementById('hotspot-svg');
      const tooltip = document.getElementById('hs-tooltip');
      const hint    = document.getElementById('hs-hint');
      svg.innerHTML = '';
      tooltip.style.display = 'none';

      const hotspots = (current.hotspots || []).filter(hs => hs.next);

      if (current.dead || current.win || hotspots.length === 0) {
        svg.style.pointerEvents = 'none';
        hint.style.opacity = '0';
        return;
      }

      svg.style.pointerEvents = 'all';
      hint.style.opacity = hinted ? '0' : '1';

      hotspots.forEach(hs => {
        const [x, y, w, h] = hs.region;

        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.style.cursor = 'pointer';

        // Hit rect
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', x);
        rect.setAttribute('y', y);
        rect.setAttribute('width', w);
        rect.setAttribute('height', h);
        rect.setAttribute('rx', '0.6');
        rect.setAttribute('fill', 'rgba(255,255,255,0)');
        rect.setAttribute('stroke', 'rgba(255,255,255,0)');
        rect.setAttribute('stroke-width', '0.4');
        rect.style.transition = 'fill 0.12s, stroke 0.12s';

        g.appendChild(rect);
        svg.appendChild(g);

        g.addEventListener('mouseenter', e => {
          rect.setAttribute('fill', 'rgba(255,255,255,0.09)');
          rect.setAttribute('stroke', 'rgba(255,255,255,0.52)');
          hint.style.opacity = '0';
          hinted = true;
          tooltip.textContent   = hs.label;
          tooltip.style.display = 'block';
          moveTooltip(e);
        });

        g.addEventListener('mousemove', moveTooltip);

        g.addEventListener('mouseleave', () => {
          rect.setAttribute('fill', 'rgba(255,255,255,0)');
          rect.setAttribute('stroke', 'rgba(255,255,255,0)');
          tooltip.style.display = 'none';
        });

        g.addEventListener('click', () => {
          tooltip.style.display = 'none';
          path.push(hs.label.length > 16 ? hs.label.slice(0, 14) + '…' : hs.label);
          current = hs.next;
          render();
        });
      });
    }

    function moveTooltip(e) {
      const tooltip = document.getElementById('hs-tooltip');
      const wrap    = document.getElementById('scene-img-wrap');
      const r       = wrap.getBoundingClientRect();
      const x       = e.clientX - r.left;
      const y       = e.clientY - r.top;

      // Keep within horizontal bounds
      tooltip.style.left = Math.min(Math.max(x, 60), r.width - 60) + 'px';
      tooltip.style.top  = y + 'px';
    }

    function restart() {
      current = tree;
      path    = [];
      hinted  = false;
      render();
    }

    render();
  </script>
</body>
</html>
